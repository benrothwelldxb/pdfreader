<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storybook Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --wood: #5c3d1e;
    --wood-light: #8b6040;
    --felt: #1a472a;
    --felt-dark: #0f2d1a;
    --spine: #8B4513;
    --page-cream: #fdf8f0;
    --page-shadow: rgba(0,0,0,0.35);
  }

  body {
    background: radial-gradient(ellipse at center, #7f0029 0%, #4a0018 50%, #1f000a 100%);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Subtle felt texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
      repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── STAGE ── */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    perspective: 2000px;
  }

  /* ── BOOK WRAPPER ── */
  #book-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
  }

  /* ── SPREAD / SINGLE ── */
  #book {
    position: relative;
    display: flex;
    background: transparent;
    transform-style: preserve-3d;
  }

  .page-wrapper {
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  #left-page {
    border-radius: 2px 0 0 2px;
    box-shadow: inset -8px 0 20px rgba(0,0,0,0.15), -4px 0 8px rgba(0,0,0,0.3);
  }

  #right-page {
    border-radius: 0 2px 2px 0;
    box-shadow: inset 8px 0 20px rgba(0,0,0,0.15), 4px 0 8px rgba(0,0,0,0.3);
  }

  #cover-page {
    border-radius: 2px;
    box-shadow: 4px 4px 20px rgba(0,0,0,0.5), -2px 2px 8px rgba(0,0,0,0.3);
  }

  .page-canvas {
    display: block;
    background: var(--page-cream);
  }

  /* Spine gutter */
  #spine-gutter {
    width: 12px;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(to right, rgba(0,0,0,0.2), rgba(0,0,0,0.05) 30%, rgba(255,255,255,0.05) 70%, rgba(0,0,0,0.2));
    z-index: 10;
    pointer-events: none;
  }

  /* Page curl highlight */
  .page-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 40%);
    pointer-events: none;
    z-index: 5;
  }

  /* ── FLIP ANIMATION ── */
  #flip-overlay {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    z-index: 20;
    pointer-events: none;
    backface-visibility: hidden;
  }

  #flip-overlay.flip-right {
    left: 50%;
    transform-origin: left center;
  }

  #flip-overlay.flip-left {
    left: 0%;
    transform-origin: right center;
  }

  #flip-front, #flip-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    overflow: hidden;
  }

  #flip-back {
    transform: rotateY(180deg);
  }

  #flip-overlay.flip-right.animating {
    animation: flipPageRight 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  #flip-overlay.flip-left.animating {
    animation: flipPageLeft 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes flipPageRight {
    0%   { transform: rotateY(0deg); box-shadow: none; }
    50%  { transform: rotateY(-90deg); filter: brightness(0.7); }
    100% { transform: rotateY(-180deg); }
  }

  @keyframes flipPageLeft {
    0%   { transform: rotateY(0deg); }
    50%  { transform: rotateY(90deg); filter: brightness(0.7); }
    100% { transform: rotateY(180deg); }
  }

  /* ── CLICK ZONES ── */
  .click-zone {
    position: absolute;
    top: 0;
    width: 20%;
    height: 100%;
    cursor: pointer;
    z-index: 30;
    transition: background 0.2s;
    font-size: 0;
  }

  #zone-prev {
    left: 0;
    border-radius: 2px 0 0 2px;
  }

  #zone-next {
    right: 0;
    border-radius: 0 2px 2px 0;
  }

  .click-zone:hover {
    background: rgba(255,255,255,0.05);
  }

  /* ── EXIT BUTTON ── */
  #btn-exit {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: Georgia, serif;
    line-height: 1;
    padding: 0;
  }

  #btn-exit:hover {
    background: rgba(180,60,40,0.5);
    border-color: rgba(255,100,80,0.5);
    color: #fff;
    transform: scale(1.08);
  }

  #btn-exit:active { transform: scale(0.95); }

  /* ── PAGE INDICATOR ── */
  #page-info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #b89a6a;
    font-size: 13px;
    letter-spacing: 1px;
    font-family: Georgia, serif;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 6px 16px;
    border-radius: 20px;
    display: none;
  }

  #page-info.visible {
    display: block;
    opacity: 1;
  }

  #page-info.fading {
    opacity: 0;
  }

  #file-input { display: none; }

  /* ── LANDING ── */
  #landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    gap: 24px;
  }

  #landing h1 {
    color: #e8d5b0;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: normal;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    text-align: center;
  }

  #landing p {
    color: #b89a6a;
    font-size: 16px;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }

  .landing-drop-zone {
    width: 320px;
    height: 200px;
    border: 2px dashed rgba(196,150,46,0.5);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
  }

  .landing-drop-zone:hover, .landing-drop-zone.dragover {
    border-color: rgba(196,150,46,0.9);
    background: rgba(196,150,46,0.08);
  }

  .landing-drop-zone .drop-icon {
    font-size: 40px;
    opacity: 0.7;
  }

  .landing-drop-zone span {
    color: #c4962e;
    font-size: 15px;
  }

  .landing-drop-zone small {
    color: #8a7060;
    font-size: 12px;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 60;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(196,150,46,0.2);
    border-top-color: #c4962e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { color: #b89a6a; font-size: 14px; }

  /* ── UTILS ── */
  #book-container { display: none; }
</style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <h1>Storybook Reader</h1>
  <p>Open a children's book PDF and read it aloud over screenshare</p>
  <div class="landing-drop-zone" id="drop-zone">
    <div class="drop-icon">📖</div>
    <span>Drop a PDF here</span>
    <small>or click to browse</small>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Opening book…</p>
</div>

<!-- Stage -->
<div id="stage">
  <div id="book-container">
    <div id="book">
      <!-- Single cover -->
      <div class="page-wrapper" id="cover-page" style="display:none">
        <canvas class="page-canvas" id="canvas-cover"></canvas>
      </div>
      <!-- Spread -->
      <div class="page-wrapper" id="left-page" style="display:none">
        <canvas class="page-canvas" id="canvas-left"></canvas>
      </div>
      <div id="spine-gutter" style="display:none"></div>
      <div class="page-wrapper" id="right-page" style="display:none">
        <canvas class="page-canvas" id="canvas-right"></canvas>
      </div>
      <!-- Flip overlay -->
      <div id="flip-overlay">
        <div id="flip-front"><canvas id="canvas-flip-front"></canvas></div>
        <div id="flip-back"><canvas id="canvas-flip-back"></canvas></div>
      </div>
    </div>
    <!-- Click zones -->
    <div class="click-zone" id="zone-prev" title="Previous page"></div>
    <div class="click-zone" id="zone-next" title="Next page"></div>
  </div>
</div>

<!-- Exit button (visible when reading) -->
<button id="btn-exit" title="Back to home">✕</button>

<!-- Page indicator (shown briefly on page turn) -->
<span id="page-info"></span>

<input type="file" id="file-input" accept=".pdf">

<script type="module">
// ── PDF.js setup ──────────────────────────────────────────────────────────────
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

// ── State ─────────────────────────────────────────────────────────────────────
let currentBook = null;
let currentSpread = 0;    // 0 = cover, 1 = spread 1 (pages 2-3), etc.
let totalSpreads = 0;
let isAnimating = false;
let pageW = 0, pageH = 0;
let pageInfoTimer = null;

// ── Elements ──────────────────────────────────────────────────────────────────
const landing = document.getElementById('landing');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const bookContainer = document.getElementById('book-container');
const stage = document.getElementById('stage');

const coverPage = document.getElementById('cover-page');
const leftPage = document.getElementById('left-page');
const rightPage = document.getElementById('right-page');
const spineGutter = document.getElementById('spine-gutter');

const cvCover = document.getElementById('canvas-cover');
const cvLeft = document.getElementById('canvas-left');
const cvRight = document.getElementById('canvas-right');
const cvFlipFront = document.getElementById('canvas-flip-front');
const cvFlipBack = document.getElementById('canvas-flip-back');

const flipOverlay = document.getElementById('flip-overlay');
const zonePrev = document.getElementById('zone-prev');
const zoneNext = document.getElementById('zone-next');

const pageInfo = document.getElementById('page-info');
const btnExit = document.getElementById('btn-exit');
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');

// ── Load PDF ──────────────────────────────────────────────────────────────────
async function loadPDF(file) {
  showLoading(`Opening "${file.name}"…`);
  const arrayBuffer = await file.arrayBuffer();
  const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pageCount = pdfDoc.numPages;

  // Sample first page for dimensions
  const firstPage = await pdfDoc.getPage(1);
  const vp = firstPage.getViewport({ scale: 1 });
  pageW = vp.width;
  pageH = vp.height;

  const book = { name: file.name.replace(/\.pdf$/i, ''), pdfDoc, pageCount };
  await openBook(book);
}

async function openBook(book) {
  currentBook = book;
  currentSpread = 0;
  totalSpreads = Math.ceil((book.pageCount - 1) / 2);

  hideLoading();
  showBook();
  await renderCurrentSpread(false);
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function computeScale() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const margin = 32;

  // For spread: two pages side by side
  const scaleW = (W - margin * 2) / (pageW * 2);
  const scaleH = (H - margin * 2) / pageH;
  return Math.min(scaleW, scaleH, 2);
}

async function renderPage(canvas, pageNum) {
  if (!currentBook || pageNum < 1 || pageNum > currentBook.pageCount) {
    const ctx = canvas.getContext('2d');
    canvas.width = Math.round(pageW * computeScale());
    canvas.height = Math.round(pageH * computeScale());
    ctx.fillStyle = '#fdf8f0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }
  const scale = computeScale();
  const page = await currentBook.pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale });
  canvas.width = vp.width;
  canvas.height = vp.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdf8f0';
  ctx.fillRect(0, 0, vp.width, vp.height);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
}

async function renderCurrentSpread(animate, direction) {
  const spread = currentSpread;
  const scale = computeScale();
  const pw = Math.round(pageW * scale);
  const ph = Math.round(pageH * scale);

  if (spread === 0) {
    // Cover — single page
    coverPage.style.display = 'block';
    leftPage.style.display = 'none';
    rightPage.style.display = 'none';
    spineGutter.style.display = 'none';
    await renderPage(cvCover, 1);
    cvCover.style.width = pw + 'px';
    cvCover.style.height = ph + 'px';
  } else {
    // Interior spread
    const leftPageNum = (spread - 1) * 2 + 2;
    const rightPageNum = leftPageNum + 1;

    coverPage.style.display = 'none';
    leftPage.style.display = 'block';
    rightPage.style.display = 'block';
    spineGutter.style.display = 'block';

    if (animate) {
      const [prevLeft, prevRight] = spreadPages(spread - (direction === 'next' ? 1 : -1));
      await renderPage(cvFlipFront, direction === 'next' ? prevRight : prevLeft);
      await renderPage(cvFlipBack, direction === 'next' ? leftPageNum : rightPageNum);

      await renderPage(cvLeft, leftPageNum);
      await renderPage(cvRight, rightPageNum);

      await doFlipAnimation(direction, pw, ph);
    } else {
      await Promise.all([
        renderPage(cvLeft, leftPageNum),
        renderPage(cvRight, rightPageNum)
      ]);
    }

    cvLeft.style.width = pw + 'px';
    cvLeft.style.height = ph + 'px';
    cvRight.style.width = pw + 'px';
    cvRight.style.height = ph + 'px';
  }

  showPageInfo();
}

function spreadPages(s) {
  if (s <= 0) return [null, null];
  const l = (s - 1) * 2 + 2;
  return [l, l + 1];
}

async function doFlipAnimation(direction, pw, ph) {
  return new Promise(resolve => {
    flipOverlay.style.width = pw + 'px';
    flipOverlay.style.height = ph + 'px';
    cvFlipFront.width = pw;
    cvFlipFront.height = ph;
    cvFlipBack.width = pw;
    cvFlipBack.height = ph;

    flipOverlay.className = direction === 'next' ? 'flip-right' : 'flip-left';
    flipOverlay.style.display = 'block';

    if (direction === 'next') {
      flipOverlay.style.left = pw + 'px';
    } else {
      flipOverlay.style.left = '0px';
    }

    requestAnimationFrame(() => {
      flipOverlay.classList.add('animating');
      const handler = () => {
        flipOverlay.removeEventListener('animationend', handler);
        flipOverlay.style.display = 'none';
        flipOverlay.className = '';
        isAnimating = false;
        resolve();
      };
      flipOverlay.addEventListener('animationend', handler);
    });
  });
}

// ── Page Info (briefly shown on turn) ─────────────────────────────────────────
function showPageInfo() {
  if (!currentBook) return;
  clearTimeout(pageInfoTimer);

  if (currentSpread === 0) {
    pageInfo.textContent = 'Cover';
  } else {
    const l = (currentSpread - 1) * 2 + 2;
    const r = Math.min(l + 1, currentBook.pageCount);
    pageInfo.textContent = r > l ? `pp. ${l}–${r}` : `p. ${l}`;
  }

  pageInfo.classList.remove('fading');
  pageInfo.classList.add('visible');

  pageInfoTimer = setTimeout(() => {
    pageInfo.classList.add('fading');
    setTimeout(() => {
      pageInfo.classList.remove('visible', 'fading');
    }, 400);
  }, 1500);
}

// ── Navigation ────────────────────────────────────────────────────────────────
async function goNext() {
  if (isAnimating) return;
  if (currentSpread >= totalSpreads) return;
  isAnimating = true;
  const prev = currentSpread;
  currentSpread++;
  await renderCurrentSpread(prev > 0, 'next');
  isAnimating = false;
}

async function goPrev() {
  if (isAnimating) return;
  if (currentSpread <= 0) return;
  isAnimating = true;
  currentSpread--;
  await renderCurrentSpread(currentSpread > 0, 'prev');
  isAnimating = false;
}

// ── UI State ──────────────────────────────────────────────────────────────────
function showLoading(msg) {
  loadingText.textContent = msg;
  landing.style.display = 'none';
  loading.style.display = 'flex';
}

function hideLoading() {
  loading.style.display = 'none';
}

function showBook() {
  landing.style.display = 'none';
  loading.style.display = 'none';
  bookContainer.style.display = 'flex';
  btnExit.style.display = 'flex';
}

function showLanding() {
  bookContainer.style.display = 'none';
  btnExit.style.display = 'none';
  pageInfo.classList.remove('visible', 'fading');
  landing.style.display = 'flex';
  currentBook = null;
}

// ── Events ────────────────────────────────────────────────────────────────────
zoneNext.addEventListener('click', goNext);
zonePrev.addEventListener('click', goPrev);

document.addEventListener('keydown', e => {
  if (!currentBook) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
  if (e.key === 'Escape') showLanding();
});

btnExit.addEventListener('click', showLanding);

// File input
fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (file && (file.type === 'application/pdf' || file.name.endsWith('.pdf'))) {
    await loadPDF(file);
  }
  fileInput.value = '';
});

function handleFileDrop(files) {
  const pdf = Array.from(files).find(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (pdf) loadPDF(pdf);
}

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFileDrop(e.dataTransfer.files);
});

stage.addEventListener('dragover', e => e.preventDefault());
stage.addEventListener('drop', e => {
  e.preventDefault();
  handleFileDrop(e.dataTransfer.files);
});

// Resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(async () => {
    if (currentBook) await renderCurrentSpread(false);
  }, 150);
});
</script>
</body>
</html>
